stages:
  - install
  - test
  - report

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

install:
  stage: install
  image: node:20
  script:
    - npm ci
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

test:android:
  stage: test
  tags:
    - android
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  script:
    - emulator -avd Pixel_7_API_34 -no-window -no-audio &
    - adb wait-for-device
    - adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
    - npm run test:android
  artifacts:
    paths:
      - allure-results/
    when: always

