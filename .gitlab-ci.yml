test:browserstack:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  script:
    - npm run test:browserstack
  variables:
    BS_USER: $BS_USER
    BS_KEY: $BS_KEY
  artifacts:
    paths:
      - allure-results/
    when: always

pages:
  stage: report
  image: node:20
  dependencies:
    - test:android
    - test:browserstack
  script:
    - npx allure generate allure-results --clean -o public
  artifacts:
    paths:
      - public/
  when: always
